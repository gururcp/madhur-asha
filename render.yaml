# Render Configuration for Madhur Asha Enterprises
# Backend API Server only (Database hosted on Neon)

services:
  # Backend API Server
  - type: web
    name: madhur-asha-api
    runtime: node
    plan: free
    region: singapore
    buildCommand: pnpm install && pnpm run build
    startCommand: cd artifacts/api-server && pnpm run start
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: PORT
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        value: https://madhur-asha.vercel.app

# Note: Database is hosted on Neon (neon.tech) - forever free PostgreSQL
# Add your Neon connection string to DATABASE_URL environment variable

