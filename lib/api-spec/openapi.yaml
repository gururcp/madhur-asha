openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Madhur Asha Enterprises Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User management
  - name: customers
    description: Customer management
  - name: suppliers
    description: Supplier management
  - name: items
    description: Item/Product management
  - name: calculations
    description: GST calculations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{id}/approve:
    post:
      operationId: approveUser
      tags: [users]
      summary: Approve a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveUserRequest"
      responses:
        "200":
          description: User approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}/reject:
    post:
      operationId: rejectUser
      tags: [users]
      summary: Reject a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /gst/lookup:
    get:
      operationId: lookupGST
      tags: [customers]
      summary: Lookup GST details by GSTIN
      description: Fetches GST registration details from government records via RapidAPI
      parameters:
        - name: gstin
          in: query
          required: true
          description: 15-character GSTIN to lookup
          schema:
            type: string
            pattern: '^\d{2}[A-Z]{5}\d{4}[A-Z]{1}[A-Z\d]{1}Z[A-Z\d]{1}$'
            example: "27AABCI6363G3ZH"
      responses:
        "200":
          description: GST details found successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GSTLookupResponse"
        "400":
          description: Invalid GSTIN format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: GSTIN not found in records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: GST API service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List customers
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerRequest"
      responses:
        "201":
          description: Customer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    put:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerRequest"
      responses:
        "200":
          description: Customer updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /customers/{id}/push-zoho:
    post:
      operationId: pushCustomerToZoho
      tags: [customers]
      summary: Push customer to Zoho Books (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer synced to Zoho
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  zohoId:
                    type: string
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /suppliers:
    get:
      operationId: listSuppliers
      tags: [suppliers]
      summary: List suppliers
      responses:
        "200":
          description: List of suppliers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supplier"
    post:
      operationId: createSupplier
      tags: [suppliers]
      summary: Create a supplier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierRequest"
      responses:
        "201":
          description: Supplier created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"

  /suppliers/{id}:
    get:
      operationId: getSupplier
      tags: [suppliers]
      summary: Get a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
    put:
      operationId: updateSupplier
      tags: [suppliers]
      summary: Update a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierRequest"
      responses:
        "200":
          description: Supplier updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
    delete:
      operationId: deleteSupplier
      tags: [suppliers]
      summary: Delete a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Supplier deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /suppliers/{id}/push-zoho:
    post:
      operationId: pushSupplierToZoho
      tags: [suppliers]
      summary: Push supplier to Zoho Books (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Supplier synced to Zoho
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  zohoId:
                    type: string

  /items:
    get:
      operationId: listItems
      tags: [items]
      summary: List items
      responses:
        "200":
          description: List of items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Item"
    post:
      operationId: createItem
      tags: [items]
      summary: Create an item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateItemRequest"
      responses:
        "201":
          description: Item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"

  /items/{id}:
    get:
      operationId: getItem
      tags: [items]
      summary: Get an item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
    put:
      operationId: updateItem
      tags: [items]
      summary: Update an item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateItemRequest"
      responses:
        "200":
          description: Item updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
    delete:
      operationId: deleteItem
      tags: [items]
      summary: Delete an item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /items/{id}/push-zoho:
    post:
      operationId: pushItemToZoho
      tags: [items]
      summary: Push item to Zoho Books (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item synced to Zoho
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  zohoId:
                    type: string

  /items/bulk-push-zoho:
    post:
      operationId: bulkPushItemsToZoho
      tags: [items]
      summary: Bulk push items to Zoho Books (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                itemIds:
                  type: array
                  items:
                    type: integer
              required: [itemIds]
      responses:
        "200":
          description: Bulk push completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        itemId:
                          type: integer
                        itemName:
                          type: string
                        success:
                          type: boolean
                        zohoId:
                          type: string
                          nullable: true
                        error:
                          type: string
                          nullable: true
                  summary:
                    type: object
                    properties:
                      total:
                        type: integer
                      succeeded:
                        type: integer
                      failed:
                        type: integer
                $ref: "#/components/schemas/MessageResponse"

  /calculations:
    get:
      operationId: listCalculations
      tags: [calculations]
      summary: List calculations
      parameters:
        - name: customerId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of calculations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Calculation"
    post:
      operationId: createCalculation
      tags: [calculations]
      summary: Save a calculation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCalculationRequest"
      responses:
        "201":
          description: Calculation saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Calculation"

  /calculations/{id}:
    get:
      operationId: getCalculation
      tags: [calculations]
      summary: Get a calculation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Calculation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Calculation"
    delete:
      operationId: deleteCalculation
      tags: [calculations]
      summary: Delete a calculation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Calculation deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [calculations]
      summary: Get dashboard stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    User:
      type: object
      properties:
        id:
          type: integer
        googleId:
          type: string
        email:
          type: string
        name:
          type: string
        picture:
          type: string
          nullable: true
        role:
          type: string
          enum: [admin, customer_access, calc_only]
        status:
          type: string
          enum: [pending, approved, rejected]
        assignedCustomerIds:
          type: array
          items:
            type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, googleId, email, name, role, status, assignedCustomerIds, createdAt]

    ApproveUserRequest:
      type: object
      properties:
        role:
          type: string
          enum: [admin, customer_access, calc_only]
        assignedCustomerIds:
          type: array
          items:
            type: integer
      required: [role]

    Customer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          description: Business Name (Legal Name from GST)
        gstin:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        contact:
          type: string
          nullable: true
        contactPerson:
          type: string
          nullable: true
        gstStatus:
          type: string
          nullable: true
          description: GST registration status (Active/Cancelled)
        state:
          type: string
          nullable: true
        pincode:
          type: string
          nullable: true
        zohoId:
          type: string
          nullable: true
        zohoSyncStatus:
          type: string
          nullable: true
          enum: [pending, syncing, synced, error]
        zohoSyncedAt:
          type: string
          format: date-time
          nullable: true
        zohoErrorMessage:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        calculationCount:
          type: integer
      required: [id, name, createdAt, calculationCount]

    CreateCustomerRequest:
      type: object
      properties:
        name:
          type: string
        gstin:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        contact:
          type: string
        contactPerson:
          type: string
          nullable: true
        gstStatus:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
        pincode:
          type: string
          nullable: true
      required: [name]

    GSTLookupResponse:
      type: object
      properties:
        name:
          type: string
          description: Legal name (becomes Business Name)
          example: "Reliance Jio Infocomm Limited"
        gstStatus:
          type: string
          enum: [Active, Cancelled]
          description: Current GST registration status
          example: "Active"
        address:
          type: string
          description: Complete principal business address
          example: "WEST END MALL - II, S.No.169/1, Sector - II, H.No.1 Village Aundh, Tal.Haveli, Pune"
        state:
          type: string
          description: State of registration
          example: "Maharashtra"
        pincode:
          type: string
          description: Pincode of principal address
          example: "411007"
      required: [name, gstStatus, address, state, pincode]

    Expense:
      type: object
      properties:
        label:
          type: string
        amount:
          type: number
        hasGst:
          type: boolean
        gstRate:
          type: number
      required: [label, amount, hasGst, gstRate]

    CalculationInputs:
      type: object
      properties:
        purchaseAmount:
          type: number
        purchaseInclGst:
          type: boolean
        purchaseGstRate:
          type: number
        saleAmount:
          type: number
        saleInclGst:
          type: boolean
        saleGstRate:
          type: number
        expenses:
          type: array
          items:
            $ref: "#/components/schemas/Expense"
        commission:
          type: number
      required: [purchaseAmount, purchaseInclGst, purchaseGstRate, saleAmount, saleInclGst, saleGstRate, expenses, commission]

    CalculationResult:
      type: object
      properties:
        purchaseExGst:
          type: number
        purchaseGstAmount:
          type: number
        saleExGst:
          type: number
        saleGstAmount:
          type: number
        netGstPayable:
          type: number
        grossProfit:
          type: number
        totalExpenses:
          type: number
        netProfit:
          type: number
      required: [purchaseExGst, purchaseGstAmount, saleExGst, saleGstAmount, netGstPayable, grossProfit, totalExpenses, netProfit]

    Calculation:
      type: object
      properties:
        id:
          type: integer
        customerId:
          type: integer
          nullable: true
        customerName:
          type: string
          nullable: true
        userId:
          type: integer
        label:
          type: string
          nullable: true
        billNumber:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        date:
          type: string
          format: date-time
        inputs:
          $ref: "#/components/schemas/CalculationInputs"
        result:
          $ref: "#/components/schemas/CalculationResult"
        createdAt:
          type: string
          format: date-time
      required: [id, userId, date, inputs, result, createdAt]

    CreateCalculationRequest:
      type: object
      properties:
        customerId:
          type: integer
          nullable: true
        label:
          type: string
          nullable: true
        billNumber:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        date:
          type: string
          format: date-time
        inputs:
          $ref: "#/components/schemas/CalculationInputs"
        result:
          $ref: "#/components/schemas/CalculationResult"
      required: [date, inputs, result]

    DashboardStats:
      type: object
      properties:
        totalCustomers:
          type: integer
        totalCalculations:
          type: integer
        netProfitMtd:
          type: number
        recentCalculations:
          type: array
          items:
            $ref: "#/components/schemas/Calculation"
      required: [totalCustomers, totalCalculations, netProfitMtd, recentCalculations]


    Supplier:
      type: object
      properties:
        id:
          type: integer
        businessName:
          type: string
        gstin:
          type: string
          nullable: true
        contactPerson:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
        pincode:
          type: string
          nullable: true
        contactInfo:
          type: string
          nullable: true
        paymentTerms:
          type: string
          nullable: true
        bankAccount:
          type: object
          nullable: true
          properties:
            accountNo:
              type: string
            ifsc:
              type: string
            bankName:
              type: string
        zohoId:
          type: string
          nullable: true
        zohoSyncStatus:
          type: string
          nullable: true
          enum: [pending, syncing, synced, error]
        zohoSyncedAt:
          type: string
          format: date-time
          nullable: true
        zohoErrorMessage:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, businessName, createdAt, updatedAt]

    CreateSupplierRequest:
      type: object
      properties:
        businessName:
          type: string
        gstin:
          type: string
          nullable: true
        contactPerson:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
        pincode:
          type: string
          nullable: true
        contactInfo:
          type: string
          nullable: true
        paymentTerms:
          type: string
          nullable: true
          enum: [Net 7, Net 15, Net 30, Net 45, Net 60]
        bankAccount:
          type: object
          nullable: true
          properties:
            accountNo:
              type: string
            ifsc:
              type: string
            bankName:
              type: string
      required: [businessName]

    Item:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        hsnCode:
          type: string
          description: 4-8 digit HSN/SAC code
        description:
          type: string
          nullable: true
        unit:
          type: string
          enum: [Nos, Kg, Grams, Litre, Metre, Box, Bag, Piece, Set]
        purchaseRate:
          type: string
          description: Stored as string for precision
        sellingRate:
          type: string
          description: Stored as string for precision
        gstRate:
          type: string
          enum: ["0", "5", "12", "18", "28"]
        itemType:
          type: string
          enum: [goods, service]
        zohoId:
          type: string
          nullable: true
        zohoSyncStatus:
          type: string
          nullable: true
          enum: [pending, syncing, synced, error]
        zohoSyncedAt:
          type: string
          format: date-time
          nullable: true
        zohoErrorMessage:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, hsnCode, unit, purchaseRate, sellingRate, gstRate, itemType, createdAt, updatedAt]

    CreateItemRequest:
      type: object
      properties:
        name:
          type: string
        hsnCode:
          type: string
          pattern: '^\d{4,8}$'
          description: 4-8 digit HSN/SAC code
        description:
          type: string
          nullable: true
        unit:
          type: string
          enum: [Nos, Kg, Grams, Litre, Metre, Box, Bag, Piece, Set]
        purchaseRate:
          type: string
        sellingRate:
          type: string
        gstRate:
          type: string
          enum: ["0", "5", "12", "18", "28"]
        itemType:
          type: string
          enum: [goods, service]
      required: [name, hsnCode, unit, purchaseRate, sellingRate, gstRate, itemType]
