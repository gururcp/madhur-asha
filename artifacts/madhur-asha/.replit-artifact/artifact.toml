kind = "web"
previewPath = "/"
title = "Madhur Asha Enterprises Portal"
version = "1.0.0"
id = "artifacts/madhur-asha"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26186

[services.development]
run = "pnpm --filter @workspace/madhur-asha run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/madhur-asha", "run", "build" ]
publicDir = "artifacts/madhur-asha/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26186"
BASE_PATH = "/"
